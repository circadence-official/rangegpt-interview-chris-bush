openapi: 3.0.3
info:
  title: LLM Leaderboard API
  version: 0.1.0
  description: Catalog of AI model providers, models, and benchmark results.
paths:
  /api/benchmarks/:
    get:
      operationId: benchmarks_list
      tags:
      - benchmarks
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Benchmark'
          description: ''
  /api/benchmarks/{id}/:
    get:
      operationId: benchmarks_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - benchmarks
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Benchmark'
          description: ''
  /api/benchmarks/{id}/leaderboard/:
    get:
      operationId: benchmarks_leaderboard_list
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - benchmarks
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaderboardEntry'
          description: ''
  /api/benchmarks/{id}/runs/:
    post:
      operationId: benchmarks_runs_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - benchmarks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BenchmarkRun'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BenchmarkRun'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BenchmarkRun'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BenchmarkRun'
          description: ''
  /api/health/:
    get:
      operationId: health_retrieve
      description: Returns a static payload used by the frontend healthcheck.
      summary: Liveness probe
      tags:
      - health
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
              examples:
                Ok:
                  value:
                    status: ok
                  summary: ok
          description: ''
  /api/insights/comparison/:
    get:
      operationId: insights_comparison_retrieve
      tags:
      - insights
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Insight'
          description: ''
  /api/models/:
    get:
      operationId: models_list
      tags:
      - models
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LLMModelList'
          description: ''
  /api/models/{id}/:
    get:
      operationId: models_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - models
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMModel'
          description: ''
  /api/models/{id}/benchmark-results/:
    get:
      operationId: models_benchmark_results_list
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - models
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBenchmarkResultHistoryList'
          description: ''
  /api/models/{id}/benchmark-summary/:
    get:
      operationId: models_benchmark_summary_list
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - models
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BenchmarkSummaryEntry'
          description: ''
  /api/models/{id}/insight/:
    get:
      operationId: models_insight_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - models
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Insight'
          description: ''
  /api/models/create/:
    post:
      operationId: models_create_create
      tags:
      - models
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LLMModel'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LLMModel'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LLMModel'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMModel'
          description: ''
components:
  schemas:
    Benchmark:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - updated_at
    BenchmarkRef:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
      required:
      - id
      - name
    BenchmarkResultHistory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        benchmark:
          allOf:
          - $ref: '#/components/schemas/BenchmarkRef'
          readOnly: true
        run:
          allOf:
          - $ref: '#/components/schemas/BenchmarkRunRef'
          readOnly: true
        score:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,4})?$
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - benchmark
      - created_at
      - id
      - run
      - score
    BenchmarkResultInline:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        llm_model:
          type: integer
        score:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,4})?$
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - llm_model
      - score
    BenchmarkRun:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        benchmark:
          type: integer
          readOnly: true
        run_at:
          type: string
          format: date-time
        results:
          type: array
          items:
            $ref: '#/components/schemas/BenchmarkResultInline'
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - benchmark
      - created_at
      - id
      - results
      - run_at
    BenchmarkRunRef:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        run_at:
          type: string
          format: date-time
      required:
      - id
      - run_at
    BenchmarkSummaryEntry:
      type: object
      properties:
        benchmark:
          allOf:
          - $ref: '#/components/schemas/BenchmarkRef'
          readOnly: true
        score:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,4})?$
          readOnly: true
        measured_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - benchmark
      - measured_at
      - score
    Insight:
      type: object
      properties:
        text:
          type: string
          readOnly: true
        llm_model:
          type: string
          readOnly: true
        cached:
          type: boolean
          readOnly: true
      required:
      - cached
      - llm_model
      - text
    LLMModel:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        provider:
          allOf:
          - $ref: '#/components/schemas/Provider'
          readOnly: true
        provider_id:
          type: integer
          writeOnly: true
        name:
          type: string
          maxLength: 200
        description:
          type: string
        context_window:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        input_price_per_1m:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,4})?$
        output_price_per_1m:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,4})?$
        arena_elo_score:
          type: integer
          nullable: true
          readOnly: true
        release_date:
          type: string
          format: date
        is_open_source:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - arena_elo_score
      - context_window
      - created_at
      - id
      - input_price_per_1m
      - name
      - output_price_per_1m
      - provider
      - provider_id
      - release_date
      - updated_at
    LLMModelList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        provider:
          allOf:
          - $ref: '#/components/schemas/Provider'
          readOnly: true
        name:
          type: string
          maxLength: 200
        context_window:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        input_price_per_1m:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,4})?$
        output_price_per_1m:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,4})?$
        arena_elo_score:
          type: integer
          nullable: true
          readOnly: true
        release_date:
          type: string
          format: date
        is_open_source:
          type: boolean
      required:
      - arena_elo_score
      - context_window
      - id
      - input_price_per_1m
      - name
      - output_price_per_1m
      - provider
      - release_date
    LeaderboardEntry:
      type: object
      properties:
        model:
          allOf:
          - $ref: '#/components/schemas/LeaderboardModel'
          readOnly: true
        score:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,4})?$
          readOnly: true
        measured_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - measured_at
      - model
      - score
    LeaderboardModel:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        provider:
          allOf:
          - $ref: '#/components/schemas/Provider'
          readOnly: true
        is_open_source:
          type: boolean
      required:
      - id
      - name
      - provider
    PaginatedBenchmarkResultHistoryList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/BenchmarkResultHistory'
    Provider:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        website:
          type: string
          format: uri
          maxLength: 200
      required:
      - id
      - name
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
